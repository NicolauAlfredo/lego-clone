<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | LEGO&reg; Shop ufficiale IT</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- TOP BAR - Barra Superiore Bloco principale: top-bar -->
    <div class="top-bar">
      <!-- Contenitore interno principale -->
      <div class="top-bar__container">
        <!-- SEZIONE SINISTRA: AREA GIOCHI -->
        <div class="top-bar__left">
          <!-- Link area giochi -->
          <a href="#" class="top-bar__left-link">AREA GIOCHI</a>
        </div>

        <!-- SEZIONE CENTRALE: MESSAGGIO E BOTTONI  -->
        <div class="top-bar__center">
          <!-- Contenitore centrale per allineamento dei bottoni e testo -->
          <div class="top-bar__center-container">
            <!-- Bottone freccia sinistra -->
            <button class="top-bar__button top-bar__button--arrow-left">
              <img
                src="assets/icons/chevron-left.svg"
                alt="Button Arrow left"
              />
            </button>

            <!-- Testo centrale -->
            <div class="top-bar__center-text">
              <p>
                <span
                  >Doppi punti fedeltà su set selezionati, dal 17/3 al
                  26/3*</span
                >
                <a href="#" class="top-bar__center-link">Compra ora</a>
              </p>
            </div>

            <!-- Bottone freccia destra -->
            <button class="top-bar__button top-bar__button--arrow-right">
              <img
                src="assets/icons/chevron-right.svg"
                alt="Button Arrow right"
              />
            </button>
          </div>
        </div>

        <!-- SEZIONE DESTRA: ACCOUNT E LEGO INSIDERS -->
        <div class="top-bar__right">
          <!-- Bottone account -->
          <button class="top-bar__account-btn">
            <img
              src="assets/icons/account-profile-color.svg"
              alt="Account Profile"
            />
            <span>Account</span>
          </button>

          <!-- Linea verticale separatrice -->
          <span class="top-bar__vertical-line"></span>

          <!-- Link LEGO Insiders -->
          <a href="#" class="top-bar__insider-link">
            <img
              src="assets/icons/brick-one-by-one-side-blue.svg"
              alt="Iscriviti al programma LEGO"
            />
            <span>Iscriviti al programma LEGO&reg; Insiders</span>
          </a>
        </div>
      </div>
    </div>
    <!-- FINE DEL TOP BAR -->

    <!-- HEADER PRINCIPALE (NAVBAR) Blocco: header -->
    <header class="header">
      <!-- Contenitore principale -->
      <div class="header__container">
        <!-- SEZIONE SINISTRA: LOGO + NAV -->
        <div class="header__left">
          <!-- Logo -->
          <a href="#" class="header__logo">
            <img src="assets/images/logo/logo-header.svg" alt="LEGO logo" />
          </a>
          <!-- Navigazione principale -->
          <nav class="header__nav">
            <ul class="header__menu">
              <!-- Voce con bottone -->
              <li class="header__menu-item">
                <button class="header__menu-btn">Acquista</button>
              </li>

              <li class="header__menu-item">
                <button class="header__menu-btn">Scopri</button>
              </li>

              <li class="header__menu-item">
                <button class="header__menu-btn">Aiuto</button>
              </li>

              <!-- Link semplice -->
              <li class="header__menu-item">
                <a href="#" class="header__menu-link">Tutti i set</a>
              </li>
            </ul>
          </nav>
        </div>

        <!-- SEZIONE CENTRALE: SEARCH -->
        <div class="header__center">
          <!-- Form di ricerca -->
          <form
            class="header__search-form"
            action="#"
            method="post"
            role="search"
          >
            <!-- Label accessibile -->
            <label for="search" class="sr-only">Search</label>

            <!-- Box ricerca -->
            <div class="header__search-box">
               
              <img
                src="assets/icons/magnifying-glass-solid.svg"
                alt="Search icon"
                class="header__search-icon"
              />

              <!-- Input -->
              <input
                type="search"
                id="search"
                name="search"
                placeholder="Search"
                class="header__search-input"
              />
            </div>
          </form>
        </div>

        <!-- SEZIONE DESTRA: AZIONI UTENTE -->
        <div class="header__right">
          <!-- Bottone preferiti -->
          <button type="button" class="header__icon-btn">
            <img
              src="assets/icons/heart.svg"
              alt="Favorites"
              class="header__icon"
            />
          </button>

          <!-- Bottone carrello -->
          <button type="button" class="header__icon-btn">
            <img
              src="assets/icons/shopping-bag.svg"
              alt="Cart"
              class="header__icon"
            />

            <!-- Contatore prodotti -->
            <span class="header__cart-count">(0)</span>
          </button>
        </div>

      </div>
    </header>
    <!-- FINE DEL HEADER -->

  </body>
</html>
